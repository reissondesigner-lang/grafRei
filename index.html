<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle GrafRei</title>

  <meta name="theme-color" content="#002868" />
  <meta name="description" content="PWA de gestão para gráfica rápida" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />

  <style>
    :root{
      --brand-1:#002868;
      --brand-2:#0088db;
      --brand-3:#ffffff;

      --bg:#0b1220;
      --bg-soft:#111a2e;
      --card:#16213b;
      --card-2:#1c2947;
      --text:#f3f7ff;
      --muted:#a8b6d6;
      --border:rgba(255,255,255,.08);
      --success:#22c55e;
      --warning:#f59e0b;
      --danger:#ef4444;
      --shadow:0 10px 30px rgba(0,0,0,.25);
      --radius:18px;
    }

    body.light{
      --bg:#f4f8ff;
      --bg-soft:#e9f1ff;
      --card:#ffffff;
      --card-2:#f5f9ff;
      --text:#0f172a;
      --muted:#475569;
      --border:rgba(15,23,42,.08);
      --shadow:0 10px 30px rgba(2,40,104,.08);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    body{min-height:100vh}
    button,input,select,textarea{font:inherit}

    .app{
      max-width:1200px;
      margin:0 auto;
      padding:16px 16px 100px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .title{
      font-size:1.4rem;
      font-weight:700;
    }

    .subtitle{
      color:var(--muted);
      font-size:.95rem;
      margin-top:4px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      cursor:pointer;
      background:var(--card);
      color:var(--text);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
    }

    .btn.primary{
      background:linear-gradient(135deg,var(--brand-1),var(--brand-2));
      color:#fff;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:14px;
      margin-bottom:18px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:var(--shadow);
    }

    .card h3{
      margin:0 0 8px;
      font-size:1rem;
      color:var(--muted);
      font-weight:600;
    }

    .big{
      font-size:1.6rem;
      font-weight:700;
    }

    .layout{
      display:grid;
      grid-template-columns:280px 1fr;
      gap:16px;
    }

    @media(max-width:900px){
      .layout{grid-template-columns:1fr}
    }

    .sidebar{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:12px;
      height:fit-content;
      box-shadow:var(--shadow);
    }

    .nav-btn{
      width:100%;
      text-align:left;
      padding:14px 14px;
      margin-bottom:8px;
      border:none;
      border-radius:14px;
      background:transparent;
      color:var(--text);
      cursor:pointer;
      border:1px solid transparent;
    }

    .nav-btn.active{
      background:linear-gradient(135deg,rgba(0,40,104,.25),rgba(0,136,219,.25));
      border-color:var(--border);
    }

    .content{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:180px;
      flex:1;
    }

    .field label{
      font-size:.9rem;
      color:var(--muted);
    }

    input,select,textarea{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:var(--card-2);
      color:var(--text);
      outline:none;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th,td{
      padding:12px 10px;
      border-bottom:1px solid var(--border);
      text-align:left;
      font-size:.95rem;
    }

    th{color:var(--muted)}

    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:.8rem;
      font-weight:700;
    }

    .status-orcamento{background:rgba(59,130,246,.15);color:#60a5fa}
    .status-aguardando{background:rgba(245,158,11,.15);color:#fbbf24}
    .status-aprovado{background:rgba(34,197,94,.15);color:#4ade80}
    .status-producao{background:rgba(168,85,247,.15);color:#c084fc}
    .status-pronto{background:rgba(14,165,233,.15);color:#38bdf8}
    .status-entregue{background:rgba(34,197,94,.15);color:#22c55e}
    .status-cancelado{background:rgba(239,68,68,.15);color:#f87171}

    .fab{
      position:fixed;
      bottom:18px;
      left:50%;
      transform:translateX(-50%);
      border:none;
      border-radius:999px;
      padding:16px 28px;
      font-weight:700;
      cursor:pointer;
      background:linear-gradient(135deg,var(--brand-1),var(--brand-2));
      color:#fff;
      box-shadow:0 12px 30px rgba(0,136,219,.35);
      z-index:99;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:999;
    }

    .modal.show{display:flex}

    .modal-card{
      width:min(980px,100%);
      max-height:92vh;
      overflow:auto;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      padding:18px;
      box-shadow:var(--shadow);
    }

    .modal-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:12px;
    }

    .section-title{
      margin:20px 0 10px;
      font-size:1rem;
      color:var(--muted);
      font-weight:700;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:end;
    }

    .mini-btn{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      background:var(--brand-2);
      color:#fff;
    }

    .muted{color:var(--muted)}
    .hidden{display:none}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="title">Controle GrafRei</div>
        <div class="subtitle">Gestão completa para gráfica rápida</div>
      </div>

      <div class="actions">
        <button class="btn" onclick="toggleTheme()">Tema</button>
        <button class="btn" onclick="backupJSON()">Backup JSON</button>
        <button class="btn" onclick="exportOrdersCSV()">Exportar CSV</button>
      </div>
    </div>

    <div class="grid" id="dashboardCards"></div>

    <div class="layout">
      <aside class="sidebar">
        <button class="nav-btn active" data-view="dashboard">Dashboard</button>
        <button class="nav-btn" data-view="orders">Pedidos</button>
        <button class="nav-btn" data-view="agenda">Agenda</button>
        <button class="nav-btn" data-view="finance">Financeiro</button>
        <button class="nav-btn" data-view="clients">Clientes</button>
        <button class="nav-btn" data-view="products">Produtos/Serviços</button>
        <button class="nav-btn" data-view="reports">Relatórios</button>
        <button class="nav-btn" data-view="settings">Configurações</button>
      </aside>

      <main class="content">
        <section id="view-dashboard"></section>
        <section id="view-orders" class="hidden"></section>
        <section id="view-agenda" class="hidden"></section>
        <section id="view-finance" class="hidden"></section>
        <section id="view-clients" class="hidden"></section>
        <section id="view-products" class="hidden"></section>
        <section id="view-reports" class="hidden"></section>
        <section id="view-settings" class="hidden"></section>
      </main>
    </div>
  </div>

  <button class="fab" onclick="openOrderModal()">+ Novo</button>

  <div class="modal" id="orderModal">
    <div class="modal-card">
      <div class="row" style="justify-content:space-between">
        <h2 style="margin:0">Novo Pedido</h2>
        <button class="btn" onclick="closeOrderModal()">Fechar</button>
      </div>

      <div class="section-title">Dados do Pedido</div>
      <div class="modal-grid">
        <div class="field">
          <label>Data</label>
          <input type="date" id="orderDate">
        </div>

        <div class="field">
          <label>Cliente</label>
          <select id="orderClient"></select>
        </div>

        <div class="field">
          <label>Status</label>
          <select id="orderStatus">
            <option value="orcamento">Orçamento</option>
            <option value="aguardando aprovação">Aguardando aprovação</option>
            <option value="aprovado">Aprovado</option>
            <option value="em produção">Em produção</option>
            <option value="pronto">Pronto</option>
            <option value="entregue">Entregue</option>
            <option value="cancelado">Cancelado</option>
          </select>
        </div>

        <div class="field">
          <label>Forma de pagamento</label>
          <select id="orderPaymentMethod">
            <option value="pix">PIX</option>
            <option value="dinheiro">Dinheiro</option>
            <option value="cartão">Cartão</option>
            <option value="boleto">Boleto</option>
            <option value="transferência">Transferência</option>
          </select>
        </div>

        <div class="field">
          <label>Condições</label>
          <select id="orderPaymentTerms">
            <option value="1x">1x</option>
            <option value="2x">2x</option>
            <option value="3x">3x</option>
            <option value="4x">4x</option>
            <option value="5x">5x</option>
            <option value="6x">6x</option>
          </select>
        </div>

        <div class="field">
          <label>Frete</label>
          <input type="number" id="orderShipping" step="0.01" value="0">
        </div>

        <div class="field">
          <label>Desconto (R$)</label>
          <input type="number" id="orderDiscountValue" step="0.01" value="0">
        </div>

        <div class="field">
          <label>Desconto (%)</label>
          <input type="number" id="orderDiscountPercent" step="0.01" value="0">
        </div>

        <div class="field">
          <label>Valor final manual (opcional)</label>
          <input type="number" id="orderFinalOverride" step="0.01" value="0">
        </div>
      </div>

      <div class="section-title">Adicionar Item</div>
      <div class="row">
        <div class="field" style="flex:2">
          <label>Produto/Serviço</label>
          <select id="itemProduct"></select>
        </div>
        <div class="field">
          <label>Quantidade</label>
          <input type="number" id="itemQty" value="1" step="0.01">
        </div>
        <button class="mini-btn" onclick="addOrderItem()">Adicionar Item</button>
      </div>

      <div class="card" style="margin-top:10px">
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Qtd</th>
              <th>Valor Unit.</th>
              <th>Total</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="orderItemsTable"></tbody>
        </table>
      </div>

      <div class="section-title">Despesas do Pedido</div>
      <div class="row">
        <div class="field">
          <label>Nome</label>
          <input type="text" id="expenseName" placeholder="Ex: Motoboy">
        </div>
        <div class="field">
          <label>Valor</label>
          <input type="number" id="expenseValue" step="0.01" value="0">
        </div>
        <div class="field">
          <label>Data</label>
          <input type="date" id="expenseDate">
        </div>
        <div class="field">
          <label>Descrição</label>
          <input type="text" id="expenseDesc" placeholder="Descrição">
        </div>
        <div class="field">
          <label>Despesa cobrável?</label>
          <select id="expenseChargeable">
            <option value="true">Sim</option>
            <option value="false">Não</option>
          </select>
        </div>
        <button class="mini-btn" onclick="addOrderExpense()">Adicionar Despesa</button>
      </div>

      <div class="card" style="margin-top:10px">
        <table>
          <thead>
            <tr>
              <th>Despesa</th>
              <th>Valor</th>
              <th>Data</th>
              <th>Cobrável</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="orderExpensesTable"></tbody>
        </table>
      </div>

      <div class="section-title">Observações</div>
      <div class="modal-grid">
        <div class="field">
          <label>Informações adicionais</label>
          <textarea id="orderNotes" rows="4"></textarea>
        </div>
      </div>

      <div class="section-title">Resumo</div>
      <div class="grid">
        <div class="card"><h3>Subtotal Itens</h3><div class="big" id="sumItems">R$ 0,00</div></div>
        <div class="card"><h3>Despesas Cobráveis</h3><div class="big" id="sumChargeable">R$ 0,00</div></div>
        <div class="card"><h3>Desconto</h3><div class="big" id="sumDiscount">R$ 0,00</div></div>
        <div class="card"><h3>Total Final</h3><div class="big" id="sumFinal">R$ 0,00</div></div>
      </div>

      <div class="row" style="justify-content:flex-end;margin-top:14px">
        <button class="btn" onclick="closeOrderModal()">Cancelar</button>
        <button class="btn primary" onclick="saveOrder()">Salvar Pedido</button>
      </div>
    </div>
  </div>

  <script>
    // =========================
    // CONFIG
    // =========================
    const STORAGE_KEY = "grafrei_v1";
    const THEME_KEY = "grafrei_theme";

    const firebaseConfig = {
  apiKey: "AIzaSyCnkcFOhfQq5E_Tn4MRKeZDdJCkNPcCKWY",
  authDomain: "grafrei-85c44.firebaseapp.com",
  projectId: "grafrei-85c44",
  storageBucket: "grafrei-85c44.firebasestorage.app",
  messagingSenderId: "1012281384232",
  appId: "1:1012281384232:web:12eea73a9711adb0af841d"
};

    // =========================
    // STATE
    // =========================
    let state = loadState();
    let tempOrderItems = [];
    let tempOrderExpenses = [];

    // =========================
    // HELPERS
    // =========================
    function uid() {
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function round2(n) {
      return Math.round((Number(n) || 0) * 100) / 100;
    }

    function money(n) {
      return (Number(n) || 0).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function monthYear(dateStr) {
      const d = new Date(dateStr + "T12:00:00");
      return { month: d.getMonth() + 1, year: d.getFullYear() };
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);

      return {
        company: {
          name: "Minha Gráfica",
          document: "",
          phone: "",
          email: ""
        },
        clients: [
          { id: uid(), name: "Cliente Exemplo", phone: "75999999999", email: "", cpf: "", address: "", notes: "" }
        ],
        products: [
          { id: uid(), name: "Cartão de Visita", salePrice: 80, costPrice: 25, unit: "cento" },
          { id: uid(), name: "Banner", salePrice: 120, costPrice: 55, unit: "unidade" }
        ],
        orders: [],
        cashflow: [],
        agenda: []
      };
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      syncEverythingToCloud();
    }

    // =========================
    // FIREBASE
    // =========================
    let firebaseReady = false;
    let db = null;
    let cloudSyncEnabled = false;
    let pendingSyncQueue = [];

    async function loadFirebaseSDK() {
      if (window.__firebaseLoaded) return true;

      try {
        const appScript = document.createElement("script");
        appScript.src = "https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js";
        document.head.appendChild(appScript);
        await new Promise((res, rej) => { appScript.onload = res; appScript.onerror = rej; });

        const dbScript = document.createElement("script");
        dbScript.src = "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js";
        document.head.appendChild(dbScript);
        await new Promise((res, rej) => { dbScript.onload = res; dbScript.onerror = rej; });

        window.__firebaseLoaded = true;
        return true;
      } catch (e) {
        console.error("Erro ao carregar Firebase", e);
        return false;
      }
    }

    function isFirebaseConfigValid() {
      return firebaseConfig.apiKey && !firebaseConfig.apiKey.includes("COLE_") &&
             firebaseConfig.projectId && !firebaseConfig.projectId.includes("COLE_");
    }

    function companyCollection() {
      const companyId = state.company?.document || state.company?.name || "grafrei-default";
      return String(companyId).replace(/[^a-zA-Z0-9_-]/g, "_").toLowerCase();
    }

    async function initFirebase() {
      const ok = await loadFirebaseSDK();
      if (!ok) return;

      try {
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }

        db = firebase.firestore();
        firebaseReady = true;
        cloudSyncEnabled = isFirebaseConfigValid();

        if (cloudSyncEnabled) {
          await firstCloudLoad();
          await flushSyncQueue();
          console.log("Firebase conectado");
        } else {
          console.log("Firebase não configurado ainda");
        }
      } catch (e) {
        console.error("Erro ao iniciar Firebase", e);
      }
    }

    async function saveDocCloud(collection, id, payload) {
      if (!firebaseReady || !cloudSyncEnabled || !navigator.onLine) {
        queueSync("save", collection, id, payload);
        return;
      }

      try {
        await db.collection("grafrei")
          .doc(companyCollection())
          .collection(collection)
          .doc(id)
          .set(payload, { merge: true });
      } catch (e) {
        console.error("Erro save cloud", e);
        queueSync("save", collection, id, payload);
      }
    }

    async function deleteDocCloud(collection, id) {
      if (!firebaseReady || !cloudSyncEnabled || !navigator.onLine) {
        queueSync("delete", collection, id, null);
        return;
      }

      try {
        await db.collection("grafrei")
          .doc(companyCollection())
          .collection(collection)
          .doc(id)
          .delete();
      } catch (e) {
        console.error("Erro delete cloud", e);
        queueSync("delete", collection, id, null);
      }
    }

    function queueSync(type, collection, id, payload) {
      pendingSyncQueue.push({ type, collection, id, payload, ts: Date.now() });
      localStorage.setItem("grafrei_sync_queue", JSON.stringify(pendingSyncQueue));
    }

    function loadSyncQueue() {
      try {
        pendingSyncQueue = JSON.parse(localStorage.getItem("grafrei_sync_queue") || "[]");
      } catch {
        pendingSyncQueue = [];
      }
    }

    async function flushSyncQueue() {
      if (!firebaseReady || !cloudSyncEnabled || !navigator.onLine || !pendingSyncQueue.length) return;

      const queue = [...pendingSyncQueue];

      try {
        for (const item of queue) {
          if (item.type === "save") {
            await db.collection("grafrei")
              .doc(companyCollection())
              .collection(item.collection)
              .doc(item.id)
              .set(item.payload, { merge: true });
          } else if (item.type === "delete") {
            await db.collection("grafrei")
              .doc(companyCollection())
              .collection(item.collection)
              .doc(item.id)
              .delete();
          }
        }

        pendingSyncQueue = [];
        localStorage.setItem("grafrei_sync_queue", JSON.stringify([]));
      } catch (e) {
        console.error("Erro ao sincronizar fila", e);
      }
    }

    async function firstCloudLoad() {
      if (!firebaseReady || !cloudSyncEnabled || !navigator.onLine) return;

      try {
        const collections = ["clients", "products", "orders", "cashflow", "agenda"];

        for (const col of collections) {
          const snap = await db.collection("grafrei")
            .doc(companyCollection())
            .collection(col)
            .get();

          const arr = [];
          snap.forEach(doc => arr.push(doc.data()));

          if (arr.length) state[col] = arr;
        }

        persist();
        renderAll();
      } catch (e) {
        console.error("Erro no carregamento inicial", e);
      }
    }

    async function syncEverythingToCloud() {
      if (!firebaseReady || !cloudSyncEnabled) return;

      const map = {
        clients: state.clients,
        products: state.products,
        orders: state.orders,
        cashflow: state.cashflow,
        agenda: state.agenda
      };

      for (const [collection, items] of Object.entries(map)) {
        for (const item of items) {
          if (item?.id) {
            saveDocCloud(collection, item.id, item);
          }
        }
      }
    }

    // =========================
    // ORDER CORE
    // =========================
    function calcOrderTotals(order) {
      const items = order.items || [];
      const expenses = order.expenses || [];

      const itemsSubtotal = items.reduce((sum, item) => {
        return sum + (Number(item.qty || 0) * Number(item.unitPrice || 0));
      }, 0);

      const chargeableExpenses = expenses
        .filter(e => e.chargeable)
        .reduce((sum, exp) => sum + Number(exp.value || 0), 0);

      const shipping = Number(order.shipping || 0);
      let gross = itemsSubtotal + chargeableExpenses + shipping;

      let discountValue = Number(order.discountValue || 0);
      const discountPercent = Number(order.discountPercent || 0);

      if (discountPercent > 0) {
        discountValue = gross * (discountPercent / 100);
      }

      let finalTotal = gross - discountValue;

      if (Number(order.finalOverride || 0) > 0) {
        finalTotal = Number(order.finalOverride);
      }

      return {
        itemsSubtotal,
        chargeableExpenses,
        shipping,
        gross,
        discountValue,
        finalTotal: Math.max(0, finalTotal)
      };
    }

    function generateInstallments(total, conditions = "1x", startDate = todayISO()) {
      const match = String(conditions).match(/(\d+)/);
      const count = match ? Number(match[1]) : 1;
      const amount = total / count;
      const installments = [];
      const base = new Date(startDate + "T12:00:00");

      for (let i = 0; i < count; i++) {
        const due = new Date(base);
        due.setMonth(due.getMonth() + i);

        installments.push({
          id: uid(),
          number: i + 1,
          amount: round2(amount),
          dueDate: due.toISOString().slice(0, 10),
          status: "a_receber",
          paidDate: ""
        });
      }

      return installments;
    }

    function syncOrderToFinance(order) {
      state.cashflow = state.cashflow.filter(x => x.orderId !== order.id);

      for (const inst of order.installments) {
        state.cashflow.push({
          id: uid(),
          orderId: order.id,
          type: "receita",
          category: "pedido",
          description: `Pedido ${order.clientName} - Parcela ${inst.number}/${order.installments.length}`,
          value: Number(inst.amount || 0),
          date: inst.dueDate,
          dueDate: inst.dueDate,
          status: inst.status,
          paymentMethod: order.paymentMethod
        });
      }

      for (const exp of order.expenses || []) {
        state.cashflow.push({
          id: uid(),
          orderId: order.id,
          type: "despesa",
          category: "pedido",
          description: exp.name || "Despesa do pedido",
          value: Number(exp.value || 0),
          date: exp.date || order.date,
          dueDate: exp.date || order.date,
          status: "recebido",
          paymentMethod: "interno"
        });
      }
    }

    function syncOrderToAgenda(order) {
      const existing = state.agenda.find(a => a.orderId === order.id);

      const agendaItem = {
        id: existing?.id || uid(),
        orderId: order.id,
        date: order.date,
        title: `${order.clientName} • ${order.status}`,
        status: ["pronto", "entregue"].includes(order.status) ? "concluido" : "agendado",
        notes: order.notes || ""
      };

      if (existing) Object.assign(existing, agendaItem);
      else state.agenda.push(agendaItem);
    }

    // =========================
    // RENDER
    // =========================
    function renderDashboardCards() {
      const now = new Date();
      const month = now.getMonth() + 1;
      const year = now.getFullYear();

      const ordersThisMonth = state.orders.filter(o => {
        const m = monthYear(o.date);
        return m.month === month && m.year === year;
      });

      const totalSales = ordersThisMonth.reduce((sum, o) => sum + Number(o.totals?.finalTotal || 0), 0);
      const received = state.cashflow
        .filter(x => x.type === "receita" && x.status === "recebido")
        .reduce((sum, x) => sum + Number(x.value || 0), 0);

      const toReceive = state.cashflow
        .filter(x => x.type === "receita" && x.status === "a_receber")
        .reduce((sum, x) => sum + Number(x.value || 0), 0);

      const overdue = state.cashflow
        .filter(x => x.type === "receita" && x.status === "atrasado")
        .reduce((sum, x) => sum + Number(x.value || 0), 0);

      document.getElementById("dashboardCards").innerHTML = `
        <div class="card"><h3>Clientes</h3><div class="big">${state.clients.length}</div></div>
        <div class="card"><h3>Vendas do Mês</h3><div class="big">${money(totalSales)}</div></div>
        <div class="card"><h3>A Receber</h3><div class="big">${money(toReceive)}</div></div>
        <div class="card"><h3>Recebido</h3><div class="big">${money(received)}</div></div>
        <div class="card"><h3>Em Atraso</h3><div class="big">${money(overdue)}</div></div>
      `;
    }

    function renderDashboard() {
      document.getElementById("view-dashboard").innerHTML = `
        <div class="card">
          <h2>Resumo do Sistema</h2>
          <p class="muted">Seu app já está com base funcional de clientes, pedidos, financeiro, agenda e sincronização com Firebase.</p>
        </div>
      `;
    }

    function renderOrders() {
      const rows = state.orders.map(order => `
        <tr>
          <td>${order.date}</td>
          <td>${order.clientName}</td>
          <td>${money(order.totals?.finalTotal || 0)}</td>
          <td><span class="badge ${statusClass(order.status)}">${order.status}</span></td>
        </tr>
      `).join("");

      document.getElementById("view-orders").innerHTML = `
        <div class="card">
          <div class="toolbar">
            <div class="field"><label>Pesquisar</label><input placeholder="Nome do pedido ou cliente"></div>
          </div>
          <table>
            <thead>
              <tr>
                <th>Data</th>
                <th>Cliente</th>
                <th>Total</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>${rows || `<tr><td colspan="4">Nenhum pedido ainda.</td></tr>`}</tbody>
          </table>
        </div>
      `;
    }

    function renderAgenda() {
      const rows = state.agenda.map(a => `
        <tr>
          <td>${a.date}</td>
          <td>${a.title}</td>
          <td>${a.status}</td>
        </tr>
      `).join("");

      document.getElementById("view-agenda").innerHTML = `
        <div class="card">
          <h2>Agenda</h2>
          <p class="muted">Base inicial pronta. Depois posso te entregar versão estilo Google Calendar.</p>
          <table>
            <thead><tr><th>Data</th><th>Evento</th><th>Status</th></tr></thead>
            <tbody>${rows || `<tr><td colspan="3">Nenhum agendamento.</td></tr>`}</tbody>
          </table>
        </div>
      `;
    }

    function renderFinance() {
      const rows = state.cashflow.map(x => `
        <tr>
          <td>${x.date}</td>
          <td>${x.description}</td>
          <td>${x.type}</td>
          <td>${money(x.value)}</td>
          <td>${x.status}</td>
        </tr>
      `).join("");

      document.getElementById("view-finance").innerHTML = `
        <div class="card">
          <h2>Financeiro</h2>
          <table>
            <thead><tr><th>Data</th><th>Descrição</th><th>Tipo</th><th>Valor</th><th>Status</th></tr></thead>
            <tbody>${rows || `<tr><td colspan="5">Nenhum lançamento.</td></tr>`}</tbody>
          </table>
        </div>
      `;
    }

    function renderClients() {
      const rows = state.clients.map(c => `
        <tr>
          <td>${c.name}</td>
          <td>${c.phone || "-"}</td>
          <td>${c.email || "-"}</td>
        </tr>
      `).join("");

      document.getElementById("view-clients").innerHTML = `
        <div class="card">
          <h2>Clientes</h2>
          <table>
            <thead><tr><th>Nome</th><th>Celular</th><th>E-mail</th></tr></thead>
            <tbody>${rows || `<tr><td colspan="3">Nenhum cliente.</td></tr>`}</tbody>
          </table>
        </div>
      `;
    }

    function renderProducts() {
      const rows = state.products.map(p => `
        <tr>
          <td>${p.name}</td>
          <td>${money(p.salePrice)}</td>
          <td>${money(p.costPrice)}</td>
          <td>${p.unit}</td>
        </tr>
      `).join("");

      document.getElementById("view-products").innerHTML = `
        <div class="card">
          <h2>Produtos / Serviços</h2>
          <table>
            <thead><tr><th>Nome</th><th>Venda</th><th>Custo</th><th>Unidade</th></tr></thead>
            <tbody>${rows || `<tr><td colspan="4">Nenhum produto.</td></tr>`}</tbody>
          </table>
        </div>
      `;
    }

    function renderReports() {
      document.getElementById("view-reports").innerHTML = `
        <div class="card">
          <h2>Relatórios</h2>
          <p class="muted">Base pronta para evolução: pedidos, vendas, pagamentos e finanças.</p>
        </div>
      `;
    }

    function renderSettings() {
      document.getElementById("view-settings").innerHTML = `
        <div class="card">
          <h2>Configurações da Empresa</h2>
          <div class="modal-grid">
            <div class="field">
              <label>Nome da Empresa</label>
              <input id="companyName" value="${state.company.name || ""}">
            </div>
            <div class="field">
              <label>CPF/CNPJ</label>
              <input id="companyDocument" value="${state.company.document || ""}">
            </div>
            <div class="field">
              <label>Celular</label>
              <input id="companyPhone" value="${state.company.phone || ""}">
            </div>
            <div class="field">
              <label>E-mail</label>
              <input id="companyEmail" value="${state.company.email || ""}">
            </div>
          </div>

          <div class="row" style="margin-top:14px">
            <button class="btn primary" onclick="saveCompany()">Salvar Empresa</button>
          </div>

          <hr style="margin:18px 0;border:none;border-top:1px solid var(--border)">

          <h3>Firebase</h3>
          <p class="muted">Cole suas credenciais direto no código no objeto <code>firebaseConfig</code>.</p>
          <p class="muted">Status: ${cloudSyncEnabled ? "Conectado" : "Aguardando configuração"}</p>
        </div>
      `;
    }

    function renderAll() {
      renderDashboardCards();
      renderDashboard();
      renderOrders();
      renderAgenda();
      renderFinance();
      renderClients();
      renderProducts();
      renderReports();
      renderSettings();
      fillClientsSelect();
      fillProductsSelect();
    }

    // =========================
    // UI / NAV
    // =========================
    function statusClass(status) {
      const map = {
        "orcamento": "status-orcamento",
        "aguardando aprovação": "status-aguardando",
        "aprovado": "status-aprovado",
        "em produção": "status-producao",
        "pronto": "status-pronto",
        "entregue": "status-entregue",
        "cancelado": "status-cancelado"
      };
      return map[status] || "";
    }

    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        const view = btn.dataset.view;
        document.querySelectorAll("main section").forEach(sec => sec.classList.add("hidden"));
        document.getElementById(`view-${view}`).classList.remove("hidden");
      });
    });

    function toggleTheme() {
      document.body.classList.toggle("light");
      localStorage.setItem(THEME_KEY, document.body.classList.contains("light") ? "light" : "dark");
    }

    function applyTheme() {
      const theme = localStorage.getItem(THEME_KEY) || "dark";
      if (theme === "light") document.body.classList.add("light");
    }

    // =========================
    // ORDER MODAL
    // =========================
    function openOrderModal() {
      tempOrderItems = [];
      tempOrderExpenses = [];
      document.getElementById("orderDate").value = todayISO();
      document.getElementById("expenseDate").value = todayISO();
      document.getElementById("orderShipping").value = 0;
      document.getElementById("orderDiscountValue").value = 0;
      document.getElementById("orderDiscountPercent").value = 0;
      document.getElementById("orderFinalOverride").value = 0;
      document.getElementById("orderNotes").value = "";
      renderTempItems();
      renderTempExpenses();
      recalcSummary();
      document.getElementById("orderModal").classList.add("show");
    }

    function closeOrderModal() {
      document.getElementById("orderModal").classList.remove("show");
    }

    function fillClientsSelect() {
      const select = document.getElementById("orderClient");
      if (!select) return;
      select.innerHTML = state.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
    }

    function fillProductsSelect() {
      const select = document.getElementById("itemProduct");
      if (!select) return;
      select.innerHTML = state.products.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
    }

    function addOrderItem() {
      const productId = document.getElementById("itemProduct").value;
      const qty = Number(document.getElementById("itemQty").value || 1);
      const product = state.products.find(p => p.id === productId);
      if (!product) return;

      tempOrderItems.push({
        id: uid(),
        productId,
        name: product.name,
        qty,
        unitPrice: Number(product.salePrice || 0)
      });

      renderTempItems();
      recalcSummary();
    }

    function removeTempItem(id) {
      tempOrderItems = tempOrderItems.filter(i => i.id !== id);
      renderTempItems();
      recalcSummary();
    }

    function renderTempItems() {
      document.getElementById("orderItemsTable").innerHTML = tempOrderItems.map(i => `
        <tr>
          <td>${i.name}</td>
          <td>${i.qty}</td>
          <td>${money(i.unitPrice)}</td>
          <td>${money(i.qty * i.unitPrice)}</td>
          <td><button class="btn" onclick="removeTempItem('${i.id}')">Remover</button></td>
        </tr>
      `).join("") || `<tr><td colspan="5">Nenhum item adicionado.</td></tr>`;
    }

    function addOrderExpense() {
      const name = document.getElementById("expenseName").value.trim();
      const value = Number(document.getElementById("expenseValue").value || 0);
      const date = document.getElementById("expenseDate").value || todayISO();
      const description = document.getElementById("expenseDesc").value.trim();
      const chargeable = document.getElementById("expenseChargeable").value === "true";

      if (!name || !value) return;

      tempOrderExpenses.push({
        id: uid(),
        name,
        value,
        date,
        description,
        chargeable
      });

      document.getElementById("expenseName").value = "";
      document.getElementById("expenseValue").value = 0;
      document.getElementById("expenseDesc").value = "";

      renderTempExpenses();
      recalcSummary();
    }

    function removeTempExpense(id) {
      tempOrderExpenses = tempOrderExpenses.filter(e => e.id !== id);
      renderTempExpenses();
      recalcSummary();
    }

    function renderTempExpenses() {
      document.getElementById("orderExpensesTable").innerHTML = tempOrderExpenses.map(e => `
        <tr>
          <td>${e.name}</td>
          <td>${money(e.value)}</td>
          <td>${e.date}</td>
          <td>${e.chargeable ? "Sim" : "Não"}</td>
          <td><button class="btn" onclick="removeTempExpense('${e.id}')">Remover</button></td>
        </tr>
      `).join("") || `<tr><td colspan="5">Nenhuma despesa adicionada.</td></tr>`;
    }

    function recalcSummary() {
      const preview = calcOrderTotals({
        items: tempOrderItems,
        expenses: tempOrderExpenses,
        shipping: Number(document.getElementById("orderShipping")?.value || 0),
        discountValue: Number(document.getElementById("orderDiscountValue")?.value || 0),
        discountPercent: Number(document.getElementById("orderDiscountPercent")?.value || 0),
        finalOverride: Number(document.getElementById("orderFinalOverride")?.value || 0)
      });

      document.getElementById("sumItems").textContent = money(preview.itemsSubtotal);
      document.getElementById("sumChargeable").textContent = money(preview.chargeableExpenses);
      document.getElementById("sumDiscount").textContent = money(preview.discountValue);
      document.getElementById("sumFinal").textContent = money(preview.finalTotal);
    }

    ["orderShipping","orderDiscountValue","orderDiscountPercent","orderFinalOverride"].forEach(id=>{
      document.addEventListener("input", e=>{
        if(e.target && e.target.id === id) recalcSummary();
      });
    });

    function saveOrder() {
      const clientId = document.getElementById("orderClient").value;
      const client = state.clients.find(c => c.id === clientId);
      if (!client) return alert("Selecione um cliente.");

      const payload = {
        id: uid(),
        date: document.getElementById("orderDate").value || todayISO(),
        clientId,
        clientName: client.name,
        status: document.getElementById("orderStatus").value,
        items: tempOrderItems,
        expenses: tempOrderExpenses,
        shipping: Number(document.getElementById("orderShipping").value || 0),
        discountValue: Number(document.getElementById("orderDiscountValue").value || 0),
        discountPercent: Number(document.getElementById("orderDiscountPercent").value || 0),
        finalOverride: Number(document.getElementById("orderFinalOverride").value || 0),
        paymentMethod: document.getElementById("orderPaymentMethod").value,
        paymentTerms: document.getElementById("orderPaymentTerms").value,
        notes: document.getElementById("orderNotes").value.trim()
      };

      const totals = calcOrderTotals(payload);

      const order = {
        ...payload,
        totals,
        installments: generateInstallments(totals.finalTotal, payload.paymentTerms, payload.date),
        createdAt: Date.now(),
        updatedAt: Date.now()
      };

      state.orders.unshift(order);
      syncOrderToFinance(order);
      syncOrderToAgenda(order);
      persist();
      renderAll();
      closeOrderModal();
      alert("Pedido salvo com sucesso.");
    }

    // =========================
    // SETTINGS / EXPORT
    // =========================
    function saveCompany() {
      state.company.name = document.getElementById("companyName").value.trim();
      state.company.document = document.getElementById("companyDocument").value.trim();
      state.company.phone = document.getElementById("companyPhone").value.trim();
      state.company.email = document.getElementById("companyEmail").value.trim();
      persist();
      renderSettings();
      alert("Dados da empresa salvos.");
    }

    function backupJSON() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "backup-grafrei.json";
      a.click();
    }

    function exportOrdersCSV() {
      const rows = [
        ["Data", "Cliente", "Status", "Total"],
        ...state.orders.map(o => [o.date, o.clientName, o.status, o.totals?.finalTotal || 0])
      ];

      const csv = rows.map(r => r.join(";")).join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "pedidos-grafrei.csv";
      a.click();
    }

    // =========================
    // PWA
    // =========================
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(console.error);
      });
    }

    window.addEventListener("online", flushSyncQueue);

    // =========================
    // INIT
    // =========================
    applyTheme();
    loadSyncQueue();
    renderAll();
    initFirebase();
  </script>
</body>
</html>
